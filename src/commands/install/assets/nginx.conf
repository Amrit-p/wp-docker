# Generated by `wpdock install`. Rewrite it with `wpdock install --prefix={{.Root}} --force`.

worker_processes  auto;

error_log  {{.Root}}/nginx/logs/error.log  warn;
pid        {{.Root}}/nginx/logs/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log    {{.Root}}/nginx/logs/access.log;

    sendfile           on;
    keepalive_timeout  65;
    server_tokens      off;

    # WordPress media and plugin uploads are the reason this is not the 1m default.
    client_max_body_size  64m;

    # nginx has to be able to write these, so they cannot stay at the compiled-in
    # defaults (usually root-owned, next to the nginx binary).
    client_body_temp_path  {{.Root}}/nginx/tmp/client_body;
    proxy_temp_path        {{.Root}}/nginx/tmp/proxy;
    fastcgi_temp_path      {{.Root}}/nginx/tmp/fastcgi;
    uwsgi_temp_path        {{.Root}}/nginx/tmp/uwsgi;
    scgi_temp_path         {{.Root}}/nginx/tmp/scgi;

    # A request whose host matches no deployed site gets nothing: nginx closes the
    # connection (444) rather than serving a page, so this host does not answer for
    # names it was never configured for. certbot's ACME challenges are unaffected —
    # they are served from each site's own vhost, not here.
    server {
        listen       80 default_server;
        server_name  _;
        return       444;
    }

    # One file per site, written by `wpdock deploy`. A glob that matches nothing
    # is not an error, so this is fine on a fresh install.
    include {{.Root}}/nginx/conf/*.conf;
}
