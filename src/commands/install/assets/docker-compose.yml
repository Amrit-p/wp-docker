# Generated by `wpdock install`. Rewrite it with `wpdock install --prefix={{.Root}} --force`.
#
# Brings up the two shared services the site commands assume, both on the `wpdock`
# network: the nginx reverse proxy and MariaDB. Start them from anywhere with:
#
#   docker compose -f {{.Root}}/docker-compose.yml up -d
#
# Service and container names carry the image version, so upgrading is a new name you can
# stand up beside the old one. `site-add` finds the proxy by its `wpdock.role=proxy` label,
# not its name, so the nginx version can change freely. MariaDB is reached by the name you
# pass to `db --create-user --db-container=...` and `site-add --db-host=...`.
#
# The ${...} values below are read from the .env file next to this file (docker compose
# loads it automatically). `wpdock install` writes a .env from .env.example on first run;
# edit it before first start. WPDOCK_MARIADB_PORT publishes MariaDB on the host at
# 127.0.0.1:<port> (default 3307, so an old stack's MariaDB can keep 3306).
#
# `name` pins the compose project, so the wpdock-mariadb-data volume keeps the same real
# name if this directory is moved or renamed. `wpdock relocate` preserves it across a move.

name: {{.Project}}

services:
  wpdock-nginx-1.27:
    image: nginx:1.27-alpine
    container_name: wpdock-nginx-1.27
    restart: unless-stopped
    labels:
      wpdock.role: proxy
    ports:
      - "${WPDOCK_HTTP_PORT:-80}:80"
      - "${WPDOCK_HTTPS_PORT:-443}:443"
    volumes:
      - {{.Root}}:{{.Root}}
    command: ["nginx", "-c", "{{.Root}}/nginx/nginx.conf", "-g", "daemon off;"]
    networks:
      - wpdock

  wpdock-mariadb-11:
    image: mariadb:11
    container_name: wpdock-mariadb-11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${WPDOCK_MARIADB_ROOT_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:${WPDOCK_MARIADB_PORT:-3307}:3306"
    volumes:
      - wpdock-mariadb-data:/var/lib/mysql
    networks:
      - wpdock

volumes:
  wpdock-mariadb-data:

networks:
  wpdock:
    name: wpdock
